<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vững Tay Lái - Game Sát Hạch</title>
  <style>
    :root {
      --bg: #65d6ff;
      --road: #414754;
      --road-edge: #f6d34f;
      --green: #2fcf74;
      --red: #ef4444;
      --ink: #172033;
      --paper: #ffffff;
      --blue: #2563eb;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, #fff6a8 0 12%, transparent 35%),
        linear-gradient(180deg, #8fe7ff 0%, #d7f8ff 48%, #9be67d 100%);
      color: var(--ink);
      font-family: Arial, Tahoma, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
    }

    .game-shell {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 12px;
    }

    .canvas-wrap {
      position: relative;
      width: min(100vw - 24px, calc((100vh - 24px) * 9 / 16));
      height: min(100vh - 24px, calc((100vw - 24px) * 16 / 9));
      max-width: 540px;
      max-height: 960px;
      border: 5px solid rgba(255, 255, 255, 0.9);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 22px 70px rgba(20, 31, 53, 0.3);
      background: #8fe7ff;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: var(--bg);
    }

    .sound-btn {
      position: absolute;
      z-index: 5;
      right: 30px;
      top: 112px;
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      color: #172033;
      font-size: 19px;
      font-weight: 800;
      box-shadow: 0 5px 12px rgba(15, 23, 42, 0.18);
      cursor: pointer;
      touch-action: manipulation;
    }

    .sound-btn.is-muted {
      background: rgba(255, 255, 255, 0.72);
      color: #64748b;
    }

    .name-overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: center;
      padding: 28px;
      background: rgba(15, 23, 42, 0.18);
    }

    .name-overlay.is-hidden {
      display: none;
    }

    .name-panel {
      width: min(100%, 420px);
      padding: 28px 24px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 22px 56px rgba(15, 23, 42, 0.3);
      text-align: center;
    }

    .name-panel h1 {
      margin: 0 0 10px;
      font-size: clamp(31px, 7vw, 44px);
      line-height: 1.02;
    }

    .name-panel p {
      margin: 0 0 18px;
      color: #475569;
      font-size: clamp(16px, 4vw, 19px);
      font-weight: 750;
      line-height: 1.35;
    }

    .name-panel input {
      width: 100%;
      height: 58px;
      margin-bottom: 8px;
      border: 3px solid #facc15;
      border-radius: 16px;
      outline: 0;
      padding: 0 16px;
      background: #fffbeb;
      color: #172033;
      font: 800 21px Arial, Tahoma, sans-serif;
      text-align: center;
      user-select: text;
      touch-action: manipulation;
    }

    .name-panel input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.18);
    }

    .name-panel input.is-invalid {
      border-color: #ef4444;
      background: #fff1f2;
      animation: inputShake 0.28s linear;
    }

    .name-error {
      min-height: 24px;
      margin-bottom: 8px;
      color: #dc2626;
      font-size: 15px;
      font-weight: 850;
    }

    @keyframes inputShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-7px); }
      50% { transform: translateX(7px); }
      75% { transform: translateX(-5px); }
    }

    .start-btn {
      width: 100%;
      min-height: 64px;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(180deg, #facc15 0%, #f59e0b 100%);
      color: #172033;
      font-size: clamp(18px, 4.6vw, 24px);
      font-weight: 950;
      box-shadow: 0 9px 0 #b45309, 0 18px 30px rgba(180, 83, 9, 0.25);
      touch-action: manipulation;
    }

    .start-btn:active {
      transform: translateY(5px);
      box-shadow: 0 4px 0 #b45309, 0 12px 22px rgba(180, 83, 9, 0.22);
    }

    .touch-controls {
      position: fixed;
      left: 0;
      right: 0;
      bottom: max(14px, env(safe-area-inset-bottom));
      display: none;
      justify-content: space-between;
      gap: 18px;
      padding: 0 18px;
      pointer-events: none;
      touch-action: none;
    }

    .touch-btn {
      width: min(42vw, 190px);
      min-height: 76px;
      border: 0;
      border-radius: 22px;
      background: linear-gradient(180deg, #ffffff 0%, #ffed84 100%);
      color: #172033;
      font-size: clamp(18px, 5vw, 28px);
      font-weight: 900;
      letter-spacing: 0;
      box-shadow: 0 12px 0 #d3a900, 0 20px 38px rgba(0, 0, 0, 0.28);
      pointer-events: auto;
      touch-action: none;
    }

    .touch-btn:active,
    .touch-btn.is-pressed {
      transform: translateY(7px);
      box-shadow: 0 5px 0 #d3a900, 0 12px 24px rgba(0, 0, 0, 0.22);
    }

    @media (hover: none), (pointer: coarse) {
      .touch-controls {
        display: flex;
      }

      .canvas-wrap {
        height: min(calc(100vh - 116px), calc((100vw - 18px) * 16 / 9));
        width: min(calc(100vw - 18px), calc((100vh - 116px) * 9 / 16));
      }
    }

    .touch-controls.is-hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main class="game-shell" aria-label="Game sát hạch lái xe">
    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="540" height="960"></canvas>
      <button class="sound-btn" id="soundToggle" type="button" aria-label="Bật tắt nhạc nền">♪</button>
      <section class="name-overlay" id="nameOverlay" aria-label="Nhập tên trước khi thi">
        <form class="name-panel" id="nameForm">
          <h2>CHƠI ĐỂ ĐỖ SÁT HẠCH</h2>
          <p>Nhập tên, ăn đủ 11 điểm vàng sa hình trong 60 giây để về đích.</p>
          <input id="nameInput" type="text" maxlength="24" autocomplete="name" placeholder="Tên bạn của bạn" required />
          <div class="name-error" id="nameError" aria-live="polite"></div>
          <button class="start-btn" type="submit">THI NÀO</button>
        </form>
      </section>
    </div>
  </main>

  <nav class="touch-controls is-hidden" aria-label="Nút điều khiển cảm ứng">
    <button class="touch-btn" id="leftBtn" type="button">RẼ TRÁI</button>
    <button class="touch-btn" id="rightBtn" type="button">RẼ PHẢI</button>
  </nav>

  <script>
    /*
      GAME VỮNG TAY LÁI
      Người chơi nhập tên ở màn hình đầu game.
      Toàn bộ game dùng canvas 540x960, sau đó CSS tự co giãn theo màn hình.
    */

    const DEFAULT_FRIEND_NAME = "BẠN ƠI";
    const EXAM_DURATION = 60;
    const MAX_SCORE = 100;
    const PASS_SCORE = 80;
    const UI_FONT = 'Arial, Tahoma, "Segoe UI", sans-serif';
    const EXAM_COURSES = [
      "Xuất phát",
      "Dừng xe nhường đường cho người đi bộ",
      "Dừng xe và khởi hành ngang dốc",
      "Qua vệt bánh xe và đường hẹp vuông góc",
      "Qua ngã tư có đèn tín hiệu giao thông",
      "Đường vòng quanh co",
      "Ghép xe dọc vào nơi đỗ",
      "Dừng xe nơi có đường sắt cắt ngang",
      "Thay đổi tốc độ khi lái xe",
      "Ghép xe ngang vào nơi đỗ",
      "Kết thúc",
    ];

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;

    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");
    const nameOverlay = document.getElementById("nameOverlay");
    const nameForm = document.getElementById("nameForm");
    const nameInput = document.getElementById("nameInput");
    const nameError = document.getElementById("nameError");
    const soundToggle = document.getElementById("soundToggle");
    const licensePhoto = new Image();
    licensePhoto.src = "image-license.png";
    const passSound = new Audio("Thi đạt.mp3");
    const failSound = new Audio("Thi trượt.m4a");
    passSound.preload = "auto";
    failSound.preload = "auto";
    passSound.volume = 1;
    failSound.volume = 1;

    const state = {
      screen: "start",
      playerName: DEFAULT_FRIEND_NAME,
      score: MAX_SCORE,
      timeLeft: EXAM_DURATION,
      countdown: 0,
      elapsed: 0,
      distance: 0,
      spawnTimer: 0,
      itemSpawnTimer: 1.8,
      examSpawnTimer: 1,
      examCollected: 0,
      flash: 0,
      shake: 0,
      modalShake: 0,
      lastTime: 0,
      obstacles: [],
      goodies: [],
      examTokens: [],
      particles: [],
      roadMarks: [],
      resultReason: "",
      finalMessage: "",
      fireworkRun: 0,
      licenseFireworkTimer: 0,
      musicEnabled: true,
    };

    const music = {
      ctx: null,
      gain: null,
      timer: null,
      step: 0,
      started: false,
      baseVolume: 0.22,
      duckVolume: 0.07,
    };

    const input = {
      left: false,
      right: false,
    };

    const car = {
      x: W / 2,
      y: H - 145,
      width: 66,
      height: 112,
      speed: 390,
      invincible: 0,
    };

    const violationNames = ["Đè vạch", "Quên xi nhan", "Chết máy", "Quá tốc độ"];
    const luckyNames = ["May mắn", "Hiếu nhắc bài", "Tự tin"];

    for (let i = 0; i < 11; i++) {
      state.roadMarks.push({ y: i * 110 - 70 });
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function shortenText(text, maxChars) {
      return text.length > maxChars ? `${text.slice(0, maxChars - 1)}...` : text;
    }

    function drawFittedText(text, x, y, maxWidth, fontSize, weight = 800, align = "left") {
      let size = fontSize;
      ctx.textAlign = align;
      do {
        ctx.font = `${weight} ${size}px ${UI_FONT}`;
        if (ctx.measureText(text).width <= maxWidth || size <= 10) break;
        size -= 1;
      } while (size > 10);
      ctx.fillText(text, x, y);
    }

    function ensureMusicContext() {
      if (!music.ctx) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return false;

        music.ctx = new AudioContextClass();
        music.gain = music.ctx.createGain();
        music.gain.gain.value = music.baseVolume;
        music.gain.connect(music.ctx.destination);
      }
      return true;
    }

    function playTone(frequency, startTime, duration, type = "triangle", volume = 0.8) {
      if (!music.ctx || !music.gain) return;

      const oscillator = music.ctx.createOscillator();
      const gainNode = music.ctx.createGain();
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, startTime);
      gainNode.gain.setValueAtTime(0.0001, startTime);
      gainNode.gain.exponentialRampToValueAtTime(volume, startTime + 0.018);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
      oscillator.connect(gainNode);
      gainNode.connect(music.gain);
      oscillator.start(startTime);
      oscillator.stop(startTime + duration + 0.03);
    }

    function playResultSound(win) {
      if (!state.musicEnabled) return;
      startMusic();
      duckMusic(true);

      const selectedSound = win ? passSound : failSound;
      const otherSound = win ? failSound : passSound;
      otherSound.pause();
      otherSound.currentTime = 0;
      selectedSound.pause();
      selectedSound.currentTime = 0;
      selectedSound.play().catch(() => {
        // Trình duyệt có thể chặn audio nếu chưa có tương tác; game vẫn tiếp tục bình thường.
        duckMusic(false);
      });
    }

    function duckMusic(shouldDuck) {
      if (!music.ctx || !music.gain) return;
      const targetVolume = shouldDuck ? music.duckVolume : music.baseVolume;
      const now = music.ctx.currentTime;
      music.gain.gain.cancelScheduledValues(now);
      music.gain.gain.setTargetAtTime(targetVolume, now, 0.08);
    }

    function scheduleMusicStep() {
      if (!music.ctx || !state.musicEnabled || !music.started) return;

      const melody = [392, 440, 494, 587, 494, 440, 392, 330, 392, 494, 523, 659, 587, 494, 440, 392];
      const bass = [196, 196, 247, 247, 220, 220, 165, 165];
      const now = music.ctx.currentTime;
      const note = melody[music.step % melody.length];

      playTone(note, now, 0.16, "triangle", 1.0);
      if (music.step % 2 === 0) {
        playTone(bass[Math.floor(music.step / 2) % bass.length], now, 0.22, "sine", 0.78);
      }

      music.step += 1;
    }

    async function startMusic() {
      if (!state.musicEnabled || document.hidden || !ensureMusicContext()) return;

      if (music.ctx.state === "suspended") {
        await music.ctx.resume();
      }

      if (music.started) return;
      music.started = true;
      scheduleMusicStep();
      music.timer = window.setInterval(scheduleMusicStep, 210);
      updateSoundButton();
    }

    function stopMusic() {
      duckMusic(false);
      if (music.timer) {
        window.clearInterval(music.timer);
        music.timer = null;
      }
      music.started = false;
      updateSoundButton();
    }

    function stopResultSounds() {
      passSound.pause();
      failSound.pause();
      passSound.currentTime = 0;
      failSound.currentTime = 0;
    }

    function toggleMusic() {
      state.musicEnabled = !state.musicEnabled;
      if (state.musicEnabled && state.screen !== "start") {
        startMusic();
      } else {
        stopMusic();
        stopResultSounds();
      }
      updateSoundButton();
    }

    function updateSoundButton() {
      soundToggle.textContent = state.musicEnabled ? "♪" : "×";
      soundToggle.classList.toggle("is-muted", !state.musicEnabled);
      soundToggle.setAttribute("aria-label", state.musicEnabled ? "Tắt nhạc nền" : "Bật nhạc nền");
    }

    function resetGame() {
      state.screen = "countdown";
      state.score = MAX_SCORE;
      state.timeLeft = EXAM_DURATION;
      state.countdown = 3;
      state.elapsed = 0;
      state.distance = 0;
      state.spawnTimer = 0.95;
      state.itemSpawnTimer = 1.35;
      state.examSpawnTimer = 0.45;
      state.examCollected = 0;
      state.flash = 0;
      state.shake = 0;
      state.modalShake = 0;
      state.obstacles = [];
      state.goodies = [];
      state.examTokens = [];
      state.particles = [];
      state.resultReason = "";
      state.finalMessage = "";
      car.x = W / 2;
      car.invincible = 0;
      syncNameOverlay();
    }

    function backToNameEntry() {
      state.screen = "start";
      state.score = MAX_SCORE;
      state.timeLeft = EXAM_DURATION;
      state.countdown = 0;
      state.elapsed = 0;
      state.obstacles = [];
      state.goodies = [];
      state.examTokens = [];
      state.examSpawnTimer = 0.45;
      state.examCollected = 0;
      state.particles = [];
      state.finalMessage = "";
      state.licenseFireworkTimer = 0;
      input.left = false;
      input.right = false;
      nameInput.value = "";
      stopMusic();
      stopResultSounds();
      syncNameOverlay();
      setTimeout(() => nameInput.focus(), 0);
    }

    function startExamFromName() {
      const cleanedName = nameInput.value.trim().replace(/\s+/g, " ");
      if (!cleanedName) {
        nameError.textContent = "Nhập tên trước đã rồi mới được thi nha.";
        nameInput.classList.remove("is-invalid");
        void nameInput.offsetWidth;
        nameInput.classList.add("is-invalid");
        nameInput.focus();
        return;
      }

      nameError.textContent = "";
      nameInput.classList.remove("is-invalid");
      state.playerName = cleanedName;
      resetGame();
      startMusic();
    }

    function syncNameOverlay() {
      nameOverlay.classList.toggle("is-hidden", state.screen !== "start");
      document.querySelector(".touch-controls").classList.toggle("is-hidden", state.screen !== "playing");
    }

    function endGame(win, reason) {
      state.screen = win ? "win" : "gameover";
      state.resultReason = reason;
      state.modalShake = 0.85;
      state.finalMessage = win
        ? `CHÚC ${state.playerName.toUpperCase()} THI TỐT, VỮNG TAY LÁI, MANG BẰNG VỀ NHÀ!`
        : reason === "Chưa hoàn thành đủ 11 bài sa hình"
          ? `Hết giờ rồi! Bạn mới hoàn thành ${state.examCollected}/11 bài sa hình. Bình tĩnh, đóng tiền thi lại, chúc bạn may mắn lần sau!`
          : reason === "Dính lỗi Tụt dốc"
            ? "Dính lỗi loại trực tiếp rồi! Tụt dốc là giám khảo bấm dừng ngay tại chỗ. Bình tĩnh, đóng tiền thi lại, lần sau giữ chân phanh chắc hơn nha!"
          : "Tạch mất rồi! Điểm số dưới 80. Bình tĩnh, đóng tiền thi lại, chúc bạn may mắn lần sau!";
      syncNameOverlay();
      playResultSound(win);

      if (win) {
        state.fireworkRun += 1;
        const runId = state.fireworkRun;
        for (let i = 0; i < 9; i++) {
          setTimeout(() => {
            if (state.screen === "win" && state.fireworkRun === runId) {
              spawnFirework(rand(90, W - 90), rand(120, H * 0.56));
            }
          }, i * 180);
        }
      }
    }

    // Tạo vật cản, trong đó "Tụt dốc" là lỗi loại trực tiếp.
    function spawnObstacle() {
      const isFatal = Math.random() < 0.11;
      const roadLeft = W * 0.18;
      const roadRight = W * 0.82;
      const obstacle = {
        x: rand(roadLeft + 48, roadRight - 48),
        y: -90,
        width: isFatal ? 116 : 112,
        height: isFatal ? 52 : 48,
        speed: rand(170, 235) + state.elapsed * 1.35,
        fatal: isFatal,
        label: isFatal ? "Tụt dốc" : violationNames[Math.floor(Math.random() * violationNames.length)],
        hit: false,
      };
      state.obstacles.push(obstacle);
    }

    // Tạo vật phẩm cộng điểm may mắn.
    function spawnGoodie() {
      const roadLeft = W * 0.18;
      const roadRight = W * 0.82;
      state.goodies.push({
        x: rand(roadLeft + 42, roadRight - 42),
        y: -80,
        radius: 30,
        speed: rand(155, 220),
        label: luckyNames[Math.floor(Math.random() * luckyNames.length)],
        value: Math.random() < 0.5 ? 2 : 3,
      });
    }

    // Tạo điểm vàng bắt buộc, đại diện cho từng bài thi sa hình.
    function spawnExamToken() {
      if (state.examCollected >= EXAM_COURSES.length || state.examTokens.length > 0) return;

      const roadLeft = W * 0.18;
      const roadRight = W * 0.82;
      state.examTokens.push({
        x: rand(roadLeft + 58, roadRight - 58),
        y: -88,
        radius: 42,
        speed: rand(265, 330),
        index: state.examCollected,
        label: EXAM_COURSES[state.examCollected],
      });
    }

    function rectsOverlap(a, b) {
      return (
        a.x - a.width / 2 < b.x + b.width / 2 &&
        a.x + a.width / 2 > b.x - b.width / 2 &&
        a.y - a.height / 2 < b.y + b.height / 2 &&
        a.y + a.height / 2 > b.y - b.height / 2
      );
    }

    function circleRectOverlap(circle, rect) {
      const cx = clamp(circle.x, rect.x - rect.width / 2, rect.x + rect.width / 2);
      const cy = clamp(circle.y, rect.y - rect.height / 2, rect.y + rect.height / 2);
      const dx = circle.x - cx;
      const dy = circle.y - cy;
      return dx * dx + dy * dy < circle.radius * circle.radius;
    }

    function penalize(points) {
      if (car.invincible > 0) return;
      state.score = Math.max(0, state.score - points);
      state.flash = 0.2;
      state.shake = 0.35;
      car.invincible = 0.7;
      if (state.score < PASS_SCORE) {
        endGame(false, "Điểm số dưới 80");
      }
    }

    function reward(points) {
      state.score = Math.min(MAX_SCORE, state.score + points);
      for (let i = 0; i < 18; i++) {
        state.particles.push({
          x: car.x + rand(-24, 24),
          y: car.y - 40 + rand(-10, 10),
          vx: rand(-90, 90),
          vy: rand(-180, -60),
          life: rand(0.45, 0.8),
          color: "#22c55e",
          size: rand(3, 7),
        });
      }
    }

    function collectExamToken(token) {
      state.examCollected = Math.max(state.examCollected, token.index + 1);
      state.examSpawnTimer = 0.45;

      for (let i = 0; i < 26; i++) {
        state.particles.push({
          x: token.x + rand(-18, 18),
          y: token.y + rand(-18, 18),
          vx: rand(-120, 120),
          vy: rand(-210, -70),
          life: rand(0.55, 0.95),
          color: Math.random() < 0.5 ? "#facc15" : "#ffffff",
          size: rand(3, 7),
        });
      }
    }

    function update(dt) {
      if (state.screen === "countdown") {
        state.countdown -= dt;
        for (const mark of state.roadMarks) {
          mark.y += dt * 220;
          if (mark.y > H + 80) mark.y = -120;
        }

        if (state.countdown <= 0) {
          state.screen = "playing";
          state.countdown = 0;
          syncNameOverlay();
        }

        updateParticles(dt);
        return;
      }

      if (state.screen !== "playing") {
        state.modalShake = Math.max(0, state.modalShake - dt);
        updateParticles(dt);
        if (state.screen === "license") {
          state.licenseFireworkTimer -= dt;
          if (state.licenseFireworkTimer <= 0) {
            spawnFirework(rand(70, W - 70), rand(70, H * 0.78));
            state.licenseFireworkTimer = rand(0.18, 0.38);
          }
        }
        return;
      }

      state.elapsed += dt;
      state.timeLeft = Math.max(0, EXAM_DURATION - state.elapsed);
      state.distance += dt * 260;
      state.flash = Math.max(0, state.flash - dt);
      state.shake = Math.max(0, state.shake - dt);
      car.invincible = Math.max(0, car.invincible - dt);

      const move = (input.right ? 1 : 0) - (input.left ? 1 : 0);
      car.x += move * car.speed * dt;
      car.x = clamp(car.x, W * 0.24, W * 0.76);

      state.spawnTimer -= dt;
      if (state.spawnTimer <= 0) {
        spawnObstacle();
        state.spawnTimer = rand(1.05, 1.55) * Math.max(0.78, 1 - state.elapsed / 120);
      }

      state.itemSpawnTimer -= dt;
      if (state.itemSpawnTimer <= 0) {
        spawnGoodie();
        state.itemSpawnTimer = rand(2.2, 3.4);
      }

      state.examSpawnTimer -= dt;
      if (state.examSpawnTimer <= 0) {
        spawnExamToken();
        state.examSpawnTimer = rand(1.1, 1.6);
      }

      for (const mark of state.roadMarks) {
        mark.y += dt * 330;
        if (mark.y > H + 80) mark.y = -120;
      }

      const carRect = { x: car.x, y: car.y, width: car.width * 0.76, height: car.height * 0.78 };

      for (const obstacle of state.obstacles) {
        obstacle.y += obstacle.speed * dt;
        if (!obstacle.hit && rectsOverlap(carRect, obstacle)) {
          obstacle.hit = true;
          if (obstacle.fatal) {
            state.score = 0;
            state.flash = 0.5;
            endGame(false, "Dính lỗi Tụt dốc");
          } else {
            penalize(5);
          }
        }
      }

      for (let i = state.goodies.length - 1; i >= 0; i--) {
        const goodie = state.goodies[i];
        goodie.y += goodie.speed * dt;
        if (circleRectOverlap(goodie, carRect)) {
          reward(goodie.value);
          state.goodies.splice(i, 1);
        }
      }

      for (let i = state.examTokens.length - 1; i >= 0; i--) {
        const token = state.examTokens[i];
        token.y += token.speed * dt;
        if (circleRectOverlap(token, carRect)) {
          collectExamToken(token);
          state.examTokens.splice(i, 1);
        } else if (token.y > H + 110) {
          state.examTokens.splice(i, 1);
          state.examSpawnTimer = Math.min(state.examSpawnTimer, 0.45);
        }
      }

      state.obstacles = state.obstacles.filter((o) => o.y < H + 120);
      state.goodies = state.goodies.filter((g) => g.y < H + 100);
      updateParticles(dt);

      if (state.examCollected >= EXAM_COURSES.length && state.score >= PASS_SCORE) {
        endGame(true, "Hoàn thành đủ 11 bài sa hình");
      } else if (state.timeLeft <= 0) {
        if (state.score >= PASS_SCORE && state.examCollected >= EXAM_COURSES.length) {
          endGame(true, "Hoàn thành 60 giây sát hạch");
        } else {
          endGame(false, "Chưa hoàn thành đủ 11 bài sa hình");
        }
      }
    }

    function updateParticles(dt) {
      for (const particle of state.particles) {
        particle.x += particle.vx * dt;
        particle.y += particle.vy * dt;
        particle.vy += 210 * dt;
        particle.life -= dt;
      }
      state.particles = state.particles.filter((p) => p.life > 0);

      if (state.screen === "win" && Math.random() < 0.04) {
        spawnFirework(rand(85, W - 85), rand(95, H * 0.55));
      }
    }

    function spawnFirework(x, y) {
      const colors = ["#ff3d71", "#ffd166", "#06d6a0", "#4cc9f0", "#f72585", "#ffffff"];
      for (let i = 0; i < 54; i++) {
        const angle = (Math.PI * 2 * i) / 54;
        const speed = rand(95, 260);
        state.particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: rand(0.75, 1.4),
          color: colors[Math.floor(Math.random() * colors.length)],
          size: rand(2.5, 6),
        });
      }
    }

    function openLicenseScreen() {
      state.screen = "license";
      state.licenseFireworkTimer = 0;
      for (let i = 0; i < 12; i++) {
        setTimeout(() => {
          if (state.screen === "license") {
            spawnFirework(rand(70, W - 70), rand(70, H * 0.78));
          }
        }, i * 120);
      }
    }

    function drawRoundedRect(x, y, width, height, radius) {
      ctx.beginPath();
      ctx.roundRect(x, y, width, height, radius);
      ctx.fill();
    }

    function drawBackground() {
      ctx.fillStyle = "#8fe7ff";
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "#4ade80";
      ctx.fillRect(0, H * 0.62, W, H * 0.38);

      ctx.fillStyle = "#ffe16a";
      ctx.beginPath();
      ctx.arc(78, 82, 42, 0, Math.PI * 2);
      ctx.fill();

      const roadLeft = W * 0.16;
      const roadWidth = W * 0.68;
      const topInset = 35;
      const bottomInset = 34;
      const stripeGap = 26;
      ctx.fillStyle = "#343b47";
      ctx.beginPath();
      ctx.moveTo(roadLeft + topInset, 0);
      ctx.lineTo(roadLeft + roadWidth - topInset, 0);
      ctx.lineTo(roadLeft + roadWidth + bottomInset, H);
      ctx.lineTo(roadLeft - bottomInset, H);
      ctx.closePath();
      ctx.fill();

      // Hai vạch vàng chạy dọc theo mép trong của mặt đường, cùng góc nghiêng với đường.
      ctx.strokeStyle = "#f9d64a";
      ctx.lineWidth = 8;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(roadLeft + topInset + stripeGap, 0);
      ctx.lineTo(roadLeft - bottomInset + stripeGap, H);
      ctx.moveTo(roadLeft + roadWidth - topInset - stripeGap, 0);
      ctx.lineTo(roadLeft + roadWidth + bottomInset - stripeGap, H);
      ctx.stroke();

      ctx.fillStyle = "rgba(255, 255, 255, 0.84)";
      for (const mark of state.roadMarks) {
        ctx.fillRect(W / 2 - 5, mark.y, 10, 62);
      }

      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.font = `800 30px ${UI_FONT}`;
      ctx.textAlign = "center";
      ctx.fillText("SÂN SÁT HẠCH", W / 2, 54);
    }

      ctx.fillStyle = "#e5e7eb";
      drawRoundedRect(36, 82, W - 72, 10, 8);

      }

    function drawCloverLeaf(x, y, rotation) {
      ctx.save();

      ctx.rotate(rotation);

      ctx.moveTo(0, 13);
      ctx.bezierCurveTo(-22, 1, -17, -24, 0, -14);

    function wrapText(text, x, y, maxWidth, lineHeight) {
      const words = text.split(" ");
      let line = "";
      const lines = [];
      for (const word of words) {
        const testLine = line ? `${line} ${word}` : word;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          lines.push(line);
          line = word;
        } else {
          line = testLine;
        }
      }
      lines.push(line);
      const startY = y - ((lines.length - 1) * lineHeight) / 2;
      lines.forEach((row, index) => ctx.fillText(row, x, startY + index * lineHeight));
    }

    function drawParticles() {
      for (const particle of state.particles) {
        ctx.globalAlpha = clamp(particle.life, 0, 1);
        ctx.fillStyle = particle.color;
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawLicensePortrait(x, y) {

    function drawLicensePhoto(x, y, width, height, radius) {
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(x, y, width, height, radius);
      ctx.clip();

      if (licensePhoto.complete && licensePhoto.naturalWidth > 0) {
        const imageRatio = licensePhoto.naturalWidth / licensePhoto.naturalHeight;
        const boxRatio = width / height;
        let sx = 0;
        let sy = 0;
        let sw = licensePhoto.naturalWidth;
        let sh = licensePhoto.naturalHeight;

        if (imageRatio > boxRatio) {
          sw = licensePhoto.naturalHeight * boxRatio;
          sx = (licensePhoto.naturalWidth - sw) / 2;
        } else {
          sh = licensePhoto.naturalWidth / boxRatio;
          sy = (licensePhoto.naturalHeight - sh) / 2;
        }

        ctx.drawImage(licensePhoto, sx, sy, sw, sh, x, y, width, height);
      } else {
        ctx.fillStyle = "#cfe8ff";
        ctx.fillRect(x, y, width, height);
        drawLicensePortrait(x + width / 2, y + height / 2);
      }

      ctx.restore();
    }

    function drawSignature(x, y) {
      ctx.save();
      ctx.translate(x, y);
      ctx.strokeStyle = "#111827";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, 18);
      ctx.bezierCurveTo(22, -12, 34, 30, 58, 4);
      ctx.bezierCurveTo(72, -11, 92, 22, 124, 0);
      ctx.stroke();
      ctx.restore();
    }

    function drawBarcode(x, y, width, height) {
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(x, y, width, height);
      ctx.fillStyle = "#111827";
      let cursor = x + 8;
      let seed = state.playerName.length * 17 + state.score;
      while (cursor < x + width - 8) {
        seed = (seed * 37 + 11) % 97;
        const barWidth = 2 + (seed % 4);
        ctx.fillRect(cursor, y + 8, barWidth, height - 16);
        cursor += barWidth + 2 + (seed % 3);
      }
    }

    function formatDate(date) {
      const day = String(date.getDate()).padStart(2, "0");
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const year = date.getFullYear();
      return `${day}.${month}.${year}`;
    }

    function formatDateForId(date) {
      const day = String(date.getDate()).padStart(2, "0");
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const year = date.getFullYear();
      return `${year}-${month}-${day}`;
    }

    function drawCountdownOverlay() {
      const count = Math.ceil(state.countdown);
      const text = count > 0 ? String(count) : "LÁI!";

      ctx.fillStyle = "rgba(15, 23, 42, 0.34)";
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "rgba(255, 255, 255, 0.94)";
      ctx.shadowColor = "rgba(0,0,0,0.26)";
      ctx.shadowBlur = 18;
      drawRoundedRect(94, 320, W - 188, 240, 28);
      ctx.shadowBlur = 0;

      ctx.fillStyle = "#172033";
      ctx.textAlign = "center";
      ctx.font = `800 ${count > 0 ? 96 : 58}px ${UI_FONT}`;
      ctx.fillText(text, W / 2, count > 0 ? 435 : 425);

      ctx.fillStyle = "#475569";
      ctx.font = `700 20px ${UI_FONT}`;
      wrapText("Hít vào, rồi lại thở ra trước khi bắt đầu", W / 2, 500, W - 240, 27);
    }

    function draw() {
      const sx = state.shake > 0 ? rand(-5, 5) : 0;
      const sy = state.shake > 0 ? rand(-4, 4) : 0;
      ctx.save();
      ctx.translate(sx, sy);

      if (state.screen === "win") {
        drawWinScreen();
        ctx.restore();
        return;
      }

      if (state.screen === "license") {
        drawLicenseScreen();
        ctx.restore();
        return;
      }

      drawBackground();
      for (const token of state.examTokens) drawExamToken(token);
      for (const goodie of state.goodies) drawGoodie(goodie);
      for (const obstacle of state.obstacles) drawObstacle(obstacle);
      drawCar();
      drawParticles();
      drawHud();

      if (state.screen === "countdown") {
        drawCountdownOverlay();
      }

      ctx.restore();

      if (state.flash > 0) {
        ctx.fillStyle = `rgba(239, 68, 68, ${state.flash * 1.8})`;
        ctx.fillRect(0, 0, W, H);
      }

      if (state.screen === "gameover") {
        drawOverlay("ỐI DỒI ÔIIII", state.finalMessage, "THI LẠI", true);
      }
    }

    function gameLoop(timestamp) {
      const dt = Math.min(0.033, (timestamp - state.lastTime) / 1000 || 0);
      state.lastTime = timestamp;
      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    function canvasPointFromEvent(event) {
      const rect = canvas.getBoundingClientRect();
      const pointer = event.touches ? event.touches[0] : event;
      return {
        x: ((pointer.clientX - rect.left) / rect.width) * W,
        y: ((pointer.clientY - rect.top) / rect.height) * H,
      };
    }

    function handleAction(event) {
      const p = canvasPointFromEvent(event);
      const inButton = p.x >= 92 && p.x <= W - 92 && p.y >= 515 && p.y <= 640;
      const inWinLicenseButton = p.x >= 88 && p.x <= W - 88 && p.y >= 555 && p.y <= 633;
      const inLicenseReplayButton = p.x >= 98 && p.x <= W - 98 && p.y >= 650 && p.y <= 722;
      if (state.screen === "gameover" && inButton) backToNameEntry();
      if (state.screen === "win" && inWinLicenseButton) openLicenseScreen();
      if (state.screen === "license" && inLicenseReplayButton) backToNameEntry();
    }

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (key === "arrowleft" || key === "a") input.left = true;
      if (key === "arrowright" || key === "d") input.right = true;
      if ((key === " " || key === "enter") && state.screen === "gameover") backToNameEntry();
      if ((key === " " || key === "enter") && state.screen === "win") openLicenseScreen();
      if ((key === " " || key === "enter") && state.screen === "license") backToNameEntry();
    });

    window.addEventListener("keyup", (event) => {
      const key = event.key.toLowerCase();
      if (key === "arrowleft" || key === "a") input.left = false;
      if (key === "arrowright" || key === "d") input.right = false;
    });

    function bindTouchButton(button, direction) {
      const setPressed = (pressed) => {
        input[direction] = pressed;
        button.classList.toggle("is-pressed", pressed);
      };

      button.addEventListener("touchstart", (event) => {
        event.preventDefault();
        setPressed(true);
      }, { passive: false });

      button.addEventListener("touchend", (event) => {
        event.preventDefault();
        setPressed(false);
      }, { passive: false });

      button.addEventListener("touchcancel", () => setPressed(false));
      button.addEventListener("mousedown", () => setPressed(true));
      button.addEventListener("mouseup", () => setPressed(false));
      button.addEventListener("mouseleave", () => setPressed(false));
    }

    bindTouchButton(leftBtn, "left");
    bindTouchButton(rightBtn, "right");

    soundToggle.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopPropagation();
      toggleMusic();
    });

    passSound.addEventListener("ended", () => duckMusic(false));
    failSound.addEventListener("ended", () => duckMusic(false));
    passSound.addEventListener("pause", () => {
      if (failSound.paused) duckMusic(false);
    });
    failSound.addEventListener("pause", () => {
      if (passSound.paused) duckMusic(false);
    });

    nameForm.addEventListener("submit", (event) => {
      event.preventDefault();
      startExamFromName();
    });

    nameInput.addEventListener("input", () => {
      if (nameInput.value.trim()) {
        nameError.textContent = "";
        nameInput.classList.remove("is-invalid");
      }
    });

    canvas.addEventListener("click", handleAction);
    canvas.addEventListener("touchstart", (event) => {
      handleAction(event);
    }, { passive: true });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        stopMusic();
      } else if (state.musicEnabled && state.screen !== "start") {
        startMusic();
      }
    });

    updateSoundButton();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
