<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vững Tay Lái - Game Sát Hạch</title>
  <style>
    :root {
      --bg: #65d6ff;
      --road: #414754;
      --road-edge: #f6d34f;
      --green: #2fcf74;
      --red: #ef4444;
      --ink: #172033;
      --paper: #ffffff;
      --blue: #2563eb;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, #fff6a8 0 12%, transparent 35%),
        linear-gradient(180deg, #8fe7ff 0%, #d7f8ff 48%, #9be67d 100%);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
    }

    .game-shell {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 12px;
    }

    .canvas-wrap {
      position: relative;
      width: min(100vw - 24px, calc((100vh - 24px) * 9 / 16));
      height: min(100vh - 24px, calc((100vw - 24px) * 16 / 9));
      max-width: 540px;
      max-height: 960px;
      border: 5px solid rgba(255, 255, 255, 0.9);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 22px 70px rgba(20, 31, 53, 0.3);
      background: #8fe7ff;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: var(--bg);
    }

    .name-overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: center;
      padding: 28px;
      background: rgba(15, 23, 42, 0.18);
    }

    .name-overlay.is-hidden {
      display: none;
    }

    .name-panel {
      width: min(100%, 420px);
      padding: 28px 24px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 22px 56px rgba(15, 23, 42, 0.3);
      text-align: center;
    }

    .name-panel h1 {
      margin: 0 0 10px;
      font-size: clamp(31px, 7vw, 44px);
      line-height: 1.02;
    }

    .name-panel p {
      margin: 0 0 18px;
      color: #475569;
      font-size: clamp(16px, 4vw, 19px);
      font-weight: 750;
      line-height: 1.35;
    }

    .name-panel input {
      width: 100%;
      height: 58px;
      margin-bottom: 8px;
      border: 3px solid #facc15;
      border-radius: 16px;
      outline: 0;
      padding: 0 16px;
      background: #fffbeb;
      color: #172033;
      font: 900 21px system-ui, sans-serif;
      text-align: center;
      user-select: text;
      touch-action: manipulation;
    }

    .name-panel input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.18);
    }

    .name-panel input.is-invalid {
      border-color: #ef4444;
      background: #fff1f2;
      animation: inputShake 0.28s linear;
    }

    .name-error {
      min-height: 24px;
      margin-bottom: 8px;
      color: #dc2626;
      font-size: 15px;
      font-weight: 850;
    }

    @keyframes inputShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-7px); }
      50% { transform: translateX(7px); }
      75% { transform: translateX(-5px); }
    }

    .start-btn {
      width: 100%;
      min-height: 64px;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(180deg, #facc15 0%, #f59e0b 100%);
      color: #172033;
      font-size: clamp(18px, 4.6vw, 24px);
      font-weight: 950;
      box-shadow: 0 9px 0 #b45309, 0 18px 30px rgba(180, 83, 9, 0.25);
      touch-action: manipulation;
    }

    .start-btn:active {
      transform: translateY(5px);
      box-shadow: 0 4px 0 #b45309, 0 12px 22px rgba(180, 83, 9, 0.22);
    }

    .touch-controls {
      position: fixed;
      left: 0;
      right: 0;
      bottom: max(14px, env(safe-area-inset-bottom));
      display: none;
      justify-content: space-between;
      gap: 18px;
      padding: 0 18px;
      pointer-events: none;
      touch-action: none;
    }

    .touch-btn {
      width: min(42vw, 190px);
      min-height: 76px;
      border: 0;
      border-radius: 22px;
      background: linear-gradient(180deg, #ffffff 0%, #ffed84 100%);
      color: #172033;
      font-size: clamp(18px, 5vw, 28px);
      font-weight: 900;
      letter-spacing: 0;
      box-shadow: 0 12px 0 #d3a900, 0 20px 38px rgba(0, 0, 0, 0.28);
      pointer-events: auto;
      touch-action: none;
    }

    .touch-btn:active,
    .touch-btn.is-pressed {
      transform: translateY(7px);
      box-shadow: 0 5px 0 #d3a900, 0 12px 24px rgba(0, 0, 0, 0.22);
    }

    @media (hover: none), (pointer: coarse) {
      .touch-controls {
        display: flex;
      }

      .canvas-wrap {
        height: min(calc(100vh - 116px), calc((100vw - 18px) * 16 / 9));
        width: min(calc(100vw - 18px), calc((100vh - 116px) * 9 / 16));
      }
    }

    .touch-controls.is-hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main class="game-shell" aria-label="Game sát hạch lái xe">
    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="540" height="960"></canvas>
      <section class="name-overlay" id="nameOverlay" aria-label="Nhập tên trước khi thi">
        <form class="name-panel" id="nameForm">
          <h2>CHƠI ĐỂ ĐỖ SÁT HẠCH</h2>
          <p>Nhập tên người đi thi để nhận lời chúc về đích.</p>
          <input id="nameInput" type="text" maxlength="24" autocomplete="name" placeholder="Tên bạn của bạn" required />
          <div class="name-error" id="nameError" aria-live="polite"></div>
          <button class="start-btn" type="submit">BẮT ĐẦU SÁT HẠCH</button>
        </form>
      </section>
    </div>
  </main>

  <nav class="touch-controls is-hidden" aria-label="Nút điều khiển cảm ứng">
    <button class="touch-btn" id="leftBtn" type="button">RẼ TRÁI</button>
    <button class="touch-btn" id="rightBtn" type="button">RẼ PHẢI</button>
  </nav>

  <script>
    /*
      GAME VỮNG TAY LÁI
      Người chơi nhập tên ở màn hình đầu game.
      Toàn bộ game dùng canvas 540x960, sau đó CSS tự co giãn theo màn hình.
    */

    const DEFAULT_FRIEND_NAME = "BẠN ƠI";
    const EXAM_DURATION = 45;
    const MAX_SCORE = 100;
    const PASS_SCORE = 80;

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;

    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");
    const nameOverlay = document.getElementById("nameOverlay");
    const nameForm = document.getElementById("nameForm");
    const nameInput = document.getElementById("nameInput");
    const nameError = document.getElementById("nameError");

    const state = {
      screen: "start",
      playerName: DEFAULT_FRIEND_NAME,
      score: MAX_SCORE,
      timeLeft: EXAM_DURATION,
      elapsed: 0,
      distance: 0,
      spawnTimer: 0,
      itemSpawnTimer: 1.8,
      flash: 0,
      shake: 0,
      modalShake: 0,
      lastTime: 0,
      obstacles: [],
      goodies: [],
      particles: [],
      roadMarks: [],
      resultReason: "",
      finalMessage: "",
      fireworkRun: 0,
    };

    const input = {
      left: false,
      right: false,
    };

    const car = {
      x: W / 2,
      y: H - 145,
      width: 66,
      height: 112,
      speed: 390,
      invincible: 0,
    };

    const violationNames = ["Đè vạch", "Quên xi nhan", "Chết máy", "Quá tốc độ"];
    const luckyNames = ["Tâm lý vững", "Hiếu nhắc bài", "May mắn nè"];

    for (let i = 0; i < 11; i++) {
      state.roadMarks.push({ y: i * 110 - 70 });
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function resetGame() {
      state.screen = "playing";
      state.score = MAX_SCORE;
      state.timeLeft = EXAM_DURATION;
      state.elapsed = 0;
      state.distance = 0;
      state.spawnTimer = 0.95;
      state.itemSpawnTimer = 1.35;
      state.flash = 0;
      state.shake = 0;
      state.modalShake = 0;
      state.obstacles = [];
      state.goodies = [];
      state.particles = [];
      state.resultReason = "";
      state.finalMessage = "";
      car.x = W / 2;
      car.invincible = 0;
      syncNameOverlay();
    }

    function backToNameEntry() {
      state.screen = "start";
      state.score = MAX_SCORE;
      state.timeLeft = EXAM_DURATION;
      state.elapsed = 0;
      state.obstacles = [];
      state.goodies = [];
      state.particles = [];
      state.finalMessage = "";
      input.left = false;
      input.right = false;
      nameInput.value = "";
      syncNameOverlay();
      setTimeout(() => nameInput.focus(), 0);
    }

    function startExamFromName() {
      const cleanedName = nameInput.value.trim().replace(/\s+/g, " ");
      if (!cleanedName) {
        nameError.textContent = "Nhập tên trước đã rồi mới được thi nha.";
        nameInput.classList.remove("is-invalid");
        void nameInput.offsetWidth;
        nameInput.classList.add("is-invalid");
        nameInput.focus();
        return;
      }

      nameError.textContent = "";
      nameInput.classList.remove("is-invalid");
      state.playerName = cleanedName;
      resetGame();
    }

    function syncNameOverlay() {
      nameOverlay.classList.toggle("is-hidden", state.screen !== "start");
      document.querySelector(".touch-controls").classList.toggle("is-hidden", state.screen !== "playing");
    }

    function endGame(win, reason) {
      state.screen = win ? "win" : "gameover";
      state.resultReason = reason;
      state.modalShake = 0.85;
      state.finalMessage = win
        ? `CHÚC ${state.playerName.toUpperCase()} THI TỐT, VỮNG TAY LÁI, MANG BẰNG VỀ NHÀ!`
        : "Tạch mất rồi! Điểm số dưới 80. Bình tĩnh, đóng tiền thi lại, chúc bạn may mắn lần sau!";
      syncNameOverlay();

      if (win) {
        state.fireworkRun += 1;
        const runId = state.fireworkRun;
        for (let i = 0; i < 9; i++) {
          setTimeout(() => {
            if (state.screen === "win" && state.fireworkRun === runId) {
              spawnFirework(rand(90, W - 90), rand(120, H * 0.56));
            }
          }, i * 180);
        }
      }
    }

    // Tạo vật cản, trong đó "Tụt dốc" là lỗi loại trực tiếp.
    function spawnObstacle() {
      const isFatal = Math.random() < 0.11;
      const roadLeft = W * 0.18;
      const roadRight = W * 0.82;
      const obstacle = {
        x: rand(roadLeft + 48, roadRight - 48),
        y: -90,
        width: isFatal ? 108 : 90,
        height: isFatal ? 52 : 48,
        speed: rand(170, 235) + state.elapsed * 1.35,
        fatal: isFatal,
        label: isFatal ? "Tụt dốc" : violationNames[Math.floor(Math.random() * violationNames.length)],
        hit: false,
      };
      state.obstacles.push(obstacle);
    }

    // Tạo vật phẩm cộng điểm may mắn.
    function spawnGoodie() {
      const roadLeft = W * 0.18;
      const roadRight = W * 0.82;
      state.goodies.push({
        x: rand(roadLeft + 42, roadRight - 42),
        y: -80,
        radius: 30,
        speed: rand(155, 220),
        label: luckyNames[Math.floor(Math.random() * luckyNames.length)],
        value: Math.random() < 0.5 ? 2 : 3,
      });
    }

    function rectsOverlap(a, b) {
      return (
        a.x - a.width / 2 < b.x + b.width / 2 &&
        a.x + a.width / 2 > b.x - b.width / 2 &&
        a.y - a.height / 2 < b.y + b.height / 2 &&
        a.y + a.height / 2 > b.y - b.height / 2
      );
    }

    function circleRectOverlap(circle, rect) {
      const cx = clamp(circle.x, rect.x - rect.width / 2, rect.x + rect.width / 2);
      const cy = clamp(circle.y, rect.y - rect.height / 2, rect.y + rect.height / 2);
      const dx = circle.x - cx;
      const dy = circle.y - cy;
      return dx * dx + dy * dy < circle.radius * circle.radius;
    }

    function penalize(points) {
      if (car.invincible > 0) return;
      state.score = Math.max(0, state.score - points);
      state.flash = 0.2;
      state.shake = 0.35;
      car.invincible = 0.7;
      if (state.score < PASS_SCORE) {
        endGame(false, "Điểm số dưới 80");
      }
    }

    function reward(points) {
      state.score = Math.min(MAX_SCORE, state.score + points);
      for (let i = 0; i < 18; i++) {
        state.particles.push({
          x: car.x + rand(-24, 24),
          y: car.y - 40 + rand(-10, 10),
          vx: rand(-90, 90),
          vy: rand(-180, -60),
          life: rand(0.45, 0.8),
          color: "#22c55e",
          size: rand(3, 7),
        });
      }
    }

    function update(dt) {
      if (state.screen !== "playing") {
        state.modalShake = Math.max(0, state.modalShake - dt);
        updateParticles(dt);
        return;
      }

      state.elapsed += dt;
      state.timeLeft = Math.max(0, EXAM_DURATION - state.elapsed);
      state.distance += dt * 260;
      state.flash = Math.max(0, state.flash - dt);
      state.shake = Math.max(0, state.shake - dt);
      car.invincible = Math.max(0, car.invincible - dt);

      const move = (input.right ? 1 : 0) - (input.left ? 1 : 0);
      car.x += move * car.speed * dt;
      car.x = clamp(car.x, W * 0.24, W * 0.76);

      state.spawnTimer -= dt;
      if (state.spawnTimer <= 0) {
        spawnObstacle();
        state.spawnTimer = rand(1.05, 1.55) * Math.max(0.78, 1 - state.elapsed / 120);
      }

      state.itemSpawnTimer -= dt;
      if (state.itemSpawnTimer <= 0) {
        spawnGoodie();
        state.itemSpawnTimer = rand(2.2, 3.4);
      }

      for (const mark of state.roadMarks) {
        mark.y += dt * 330;
        if (mark.y > H + 80) mark.y = -120;
      }

      const carRect = { x: car.x, y: car.y, width: car.width * 0.76, height: car.height * 0.78 };

      for (const obstacle of state.obstacles) {
        obstacle.y += obstacle.speed * dt;
        if (!obstacle.hit && rectsOverlap(carRect, obstacle)) {
          obstacle.hit = true;
          if (obstacle.fatal) {
            state.score = 0;
            state.flash = 0.5;
            endGame(false, "Dính lỗi Tụt dốc");
          } else {
            penalize(5);
          }
        }
      }

      for (let i = state.goodies.length - 1; i >= 0; i--) {
        const goodie = state.goodies[i];
        goodie.y += goodie.speed * dt;
        if (circleRectOverlap(goodie, carRect)) {
          reward(goodie.value);
          state.goodies.splice(i, 1);
        }
      }

      state.obstacles = state.obstacles.filter((o) => o.y < H + 120);
      state.goodies = state.goodies.filter((g) => g.y < H + 100);
      updateParticles(dt);

      if (state.timeLeft <= 0 && state.score >= PASS_SCORE) {
        endGame(true, "Hoàn thành 45 giây sát hạch");
      }
    }

    function updateParticles(dt) {
      for (const particle of state.particles) {
        particle.x += particle.vx * dt;
        particle.y += particle.vy * dt;
        particle.vy += 210 * dt;
        particle.life -= dt;
      }
      state.particles = state.particles.filter((p) => p.life > 0);

      if (state.screen === "win" && Math.random() < 0.04) {
        spawnFirework(rand(85, W - 85), rand(95, H * 0.55));
      }
    }

    function spawnFirework(x, y) {
      const colors = ["#ff3d71", "#ffd166", "#06d6a0", "#4cc9f0", "#f72585", "#ffffff"];
      for (let i = 0; i < 54; i++) {
        const angle = (Math.PI * 2 * i) / 54;
        const speed = rand(95, 260);
        state.particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: rand(0.75, 1.4),
          color: colors[Math.floor(Math.random() * colors.length)],
          size: rand(2.5, 6),
        });
      }
    }

    function drawRoundedRect(x, y, width, height, radius) {
      ctx.beginPath();
      ctx.roundRect(x, y, width, height, radius);
      ctx.fill();
    }

    function drawBackground() {
      ctx.fillStyle = "#8fe7ff";
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "#4ade80";
      ctx.fillRect(0, H * 0.62, W, H * 0.38);

      ctx.fillStyle = "#ffe16a";
      ctx.beginPath();
      ctx.arc(78, 82, 42, 0, Math.PI * 2);
      ctx.fill();

      const roadLeft = W * 0.16;
      const roadWidth = W * 0.68;
      const topInset = 35;
      const bottomInset = 34;
      const stripeGap = 26;
      ctx.fillStyle = "#343b47";
      ctx.beginPath();
      ctx.moveTo(roadLeft + topInset, 0);
      ctx.lineTo(roadLeft + roadWidth - topInset, 0);
      ctx.lineTo(roadLeft + roadWidth + bottomInset, H);
      ctx.lineTo(roadLeft - bottomInset, H);
      ctx.closePath();
      ctx.fill();

      // Hai vạch vàng chạy dọc theo mép trong của mặt đường, cùng góc nghiêng với đường.
      ctx.strokeStyle = "#f9d64a";
      ctx.lineWidth = 8;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(roadLeft + topInset + stripeGap, 0);
      ctx.lineTo(roadLeft - bottomInset + stripeGap, H);
      ctx.moveTo(roadLeft + roadWidth - topInset - stripeGap, 0);
      ctx.lineTo(roadLeft + roadWidth + bottomInset - stripeGap, H);
      ctx.stroke();

      ctx.fillStyle = "rgba(255, 255, 255, 0.84)";
      for (const mark of state.roadMarks) {
        ctx.fillRect(W / 2 - 5, mark.y, 10, 62);
      }

      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.font = "900 30px system-ui";
      ctx.textAlign = "center";
      ctx.fillText("SÂN SÁT HẠCH", W / 2, 54);
    }

    function drawHud() {
      const scoreShake = state.shake > 0 ? Math.sin(performance.now() / 26) * 5 : 0;

      ctx.fillStyle = "rgba(255, 255, 255, 0.92)";
      ctx.shadowColor = "rgba(0,0,0,0.18)";
      ctx.shadowBlur = 14;
      drawRoundedRect(18, 18, W - 36, 84, 18);
      ctx.shadowBlur = 0;

      ctx.fillStyle = state.score < PASS_SCORE ? "#ef4444" : "#172033";
      ctx.font = "900 34px system-ui";
      ctx.textAlign = "left";
      ctx.fillText(`ĐIỂM: ${state.score}`, 36 + scoreShake, 72);

      ctx.fillStyle = "#2563eb";
      ctx.font = "900 24px system-ui";
      ctx.textAlign = "right";
      ctx.fillText(`${Math.ceil(state.timeLeft)}s`, W - 36, 69);

      ctx.fillStyle = "#e5e7eb";
      drawRoundedRect(36, 82, W - 72, 10, 8);
      ctx.fillStyle = state.timeLeft < 10 ? "#ef4444" : "#22c55e";
      drawRoundedRect(36, 82, (W - 72) * (state.timeLeft / EXAM_DURATION), 10, 8);
    }

    function drawCar() {
      ctx.save();
      ctx.translate(car.x, car.y);
      if (car.invincible > 0 && Math.floor(performance.now() / 80) % 2 === 0) {
        ctx.globalAlpha = 0.55;
      }

      ctx.fillStyle = "#e11d48";
      drawRoundedRect(-car.width / 2, -car.height / 2, car.width, car.height, 18);

      ctx.fillStyle = "#fecdd3";
      drawRoundedRect(-22, -36, 44, 35, 11);
      ctx.fillStyle = "#be123c";
      drawRoundedRect(-24, 8, 48, 34, 13);

      ctx.fillStyle = "#111827";
      drawRoundedRect(-41, -37, 13, 28, 6);
      drawRoundedRect(28, -37, 13, 28, 6);
      drawRoundedRect(-41, 25, 13, 28, 6);
      drawRoundedRect(28, 25, 13, 28, 6);

      ctx.fillStyle = "#fef3c7";
      ctx.fillRect(-24, -57, 14, 8);
      ctx.fillRect(10, -57, 14, 8);
      ctx.fillStyle = "#ffffff";
      ctx.font = "900 16px system-ui";
      ctx.textAlign = "center";
      ctx.fillText("THI", 0, 54);
      ctx.restore();
    }

    function drawObstacle(obstacle) {
      ctx.save();
      ctx.translate(obstacle.x, obstacle.y);
      ctx.fillStyle = obstacle.fatal ? "#7f1d1d" : "#fb923c";
      ctx.shadowColor = "rgba(0,0,0,0.25)";
      ctx.shadowBlur = 10;
      drawRoundedRect(-obstacle.width / 2, -obstacle.height / 2, obstacle.width, obstacle.height, 12);
      ctx.shadowBlur = 0;

      ctx.fillStyle = obstacle.fatal ? "#fee2e2" : "#1f2937";
      ctx.font = obstacle.fatal ? "900 20px system-ui" : "900 17px system-ui";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(obstacle.label, 0, 0);
      ctx.restore();
    }

    function drawGoodie(goodie) {
      ctx.save();
      ctx.translate(goodie.x, goodie.y);
      ctx.fillStyle = "#16a34a";
      ctx.shadowColor = "rgba(34,197,94,0.55)";
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(0, 0, goodie.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.fillStyle = "#ffffff";
      ctx.font = "900 15px system-ui";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      wrapText(goodie.label, 0, -5, 68, 16);
      ctx.font = "900 14px system-ui";
      ctx.fillText(`+${goodie.value}`, 0, 20);
      ctx.restore();
    }

    function wrapText(text, x, y, maxWidth, lineHeight) {
      const words = text.split(" ");
      let line = "";
      const lines = [];
      for (const word of words) {
        const testLine = line ? `${line} ${word}` : word;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          lines.push(line);
          line = word;
        } else {
          line = testLine;
        }
      }
      lines.push(line);
      const startY = y - ((lines.length - 1) * lineHeight) / 2;
      lines.forEach((row, index) => ctx.fillText(row, x, startY + index * lineHeight));
    }

    function drawParticles() {
      for (const particle of state.particles) {
        ctx.globalAlpha = clamp(particle.life, 0, 1);
        ctx.fillStyle = particle.color;
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawOverlay(title, body, buttonLabel, shouldShake = false) {
      ctx.fillStyle = "rgba(15, 23, 42, 0.68)";
      ctx.fillRect(0, 0, W, H);

      ctx.save();
      if (shouldShake && state.modalShake > 0) {
        ctx.translate(rand(-9, 9) * state.modalShake, rand(-7, 7) * state.modalShake);
      }

      ctx.fillStyle = "#ffffff";
      ctx.shadowColor = "rgba(0,0,0,0.28)";
      ctx.shadowBlur = 18;
      drawRoundedRect(46, 205, W - 92, 430, 24);
      ctx.shadowBlur = 0;

      ctx.fillStyle = "#172033";
      ctx.textAlign = "center";
      ctx.font = "900 41px system-ui";
      wrapText(title, W / 2, 282, W - 140, 45);

      ctx.fillStyle = "#475569";
      ctx.font = "800 22px system-ui";
      wrapText(body, W / 2, 392, W - 140, 31);

      ctx.fillStyle = "#facc15";
      drawRoundedRect(92, 515, W - 184, 78, 18);
      ctx.fillStyle = "#172033";
      ctx.font = "900 25px system-ui";
      ctx.fillText(buttonLabel, W / 2, 564);
      ctx.restore();
    }

    function drawWinScreen() {
      drawBackground();
      drawParticles();
      ctx.fillStyle = "rgba(14, 116, 144, 0.34)";
      ctx.fillRect(0, 0, W, H);

      ctx.save();
      if (state.modalShake > 0) {
        ctx.translate(rand(-8, 8) * state.modalShake, rand(-6, 6) * state.modalShake);
      }

      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.font = "900 37px system-ui";
      wrapText(state.finalMessage, W / 2, 250, W - 82, 46);

      ctx.fillStyle = "#fef3c7";
      ctx.font = "900 25px system-ui";
      ctx.fillText(`Điểm về đích: ${state.score}`, W / 2, 480);

      ctx.fillStyle = "#22c55e";
      drawRoundedRect(98, 565, W - 196, 74, 18);
      ctx.fillStyle = "#ffffff";
      ctx.font = "900 24px system-ui";
      ctx.fillText("THI LẠI CHO VUI", W / 2, 612);
      ctx.restore();
    }

    function draw() {
      const sx = state.shake > 0 ? rand(-5, 5) : 0;
      const sy = state.shake > 0 ? rand(-4, 4) : 0;
      ctx.save();
      ctx.translate(sx, sy);

      if (state.screen === "win") {
        drawWinScreen();
        ctx.restore();
        return;
      }

      drawBackground();
      for (const goodie of state.goodies) drawGoodie(goodie);
      for (const obstacle of state.obstacles) drawObstacle(obstacle);
      drawCar();
      drawParticles();
      drawHud();

      ctx.restore();

      if (state.flash > 0) {
        ctx.fillStyle = `rgba(239, 68, 68, ${state.flash * 1.8})`;
        ctx.fillRect(0, 0, W, H);
      }

      if (state.screen === "gameover") {
        drawOverlay("ỐI DỒI ÔIIII", state.finalMessage, "THI LẠI", true);
      }
    }

    function gameLoop(timestamp) {
      const dt = Math.min(0.033, (timestamp - state.lastTime) / 1000 || 0);
      state.lastTime = timestamp;
      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    function canvasPointFromEvent(event) {
      const rect = canvas.getBoundingClientRect();
      const pointer = event.touches ? event.touches[0] : event;
      return {
        x: ((pointer.clientX - rect.left) / rect.width) * W,
        y: ((pointer.clientY - rect.top) / rect.height) * H,
      };
    }

    function handleAction(event) {
      const p = canvasPointFromEvent(event);
      const inButton = p.x >= 92 && p.x <= W - 92 && p.y >= 515 && p.y <= 640;
      const inWinButton = p.x >= 98 && p.x <= W - 98 && p.y >= 565 && p.y <= 650;
      if (state.screen === "gameover" && inButton) backToNameEntry();
      if (state.screen === "win" && inWinButton) backToNameEntry();
    }

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (key === "arrowleft" || key === "a") input.left = true;
      if (key === "arrowright" || key === "d") input.right = true;
      if ((key === " " || key === "enter") && state.screen === "gameover") backToNameEntry();
      if ((key === " " || key === "enter") && state.screen === "win") backToNameEntry();
    });

    window.addEventListener("keyup", (event) => {
      const key = event.key.toLowerCase();
      if (key === "arrowleft" || key === "a") input.left = false;
      if (key === "arrowright" || key === "d") input.right = false;
    });

    function bindTouchButton(button, direction) {
      const setPressed = (pressed) => {
        input[direction] = pressed;
        button.classList.toggle("is-pressed", pressed);
      };

      button.addEventListener("touchstart", (event) => {
        event.preventDefault();
        setPressed(true);
      }, { passive: false });

      button.addEventListener("touchend", (event) => {
        event.preventDefault();
        setPressed(false);
      }, { passive: false });

      button.addEventListener("touchcancel", () => setPressed(false));
      button.addEventListener("mousedown", () => setPressed(true));
      button.addEventListener("mouseup", () => setPressed(false));
      button.addEventListener("mouseleave", () => setPressed(false));
    }

    bindTouchButton(leftBtn, "left");
    bindTouchButton(rightBtn, "right");

    nameForm.addEventListener("submit", (event) => {
      event.preventDefault();
      startExamFromName();
    });

    nameInput.addEventListener("input", () => {
      if (nameInput.value.trim()) {
        nameError.textContent = "";
        nameInput.classList.remove("is-invalid");
      }
    });

    canvas.addEventListener("click", handleAction);
    canvas.addEventListener("touchstart", (event) => {
      handleAction(event);
    }, { passive: true });

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
